services:
  # ── Storage ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-woundiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woundiq_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-woundiq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Orchestration ────────────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4200/api/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-woundiq}:${POSTGRES_PASSWORD:-woundiq_dev_only}@postgres:5432/${POSTGRES_DB:-woundiq}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-woundiq}:${POSTGRES_PASSWORD:-woundiq_dev_only}@postgres:5432/${POSTGRES_DB:-woundiq}
      REDIS_URL: redis://redis:6379/0
      PREFECT_API_URL: http://prefect:4200/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./pipeline:/app/pipeline
      - ./extraction:/app/extraction
      - ./eligibility:/app/eligibility
      - ./synthetic:/app/synthetic

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-woundiq}:${POSTGRES_PASSWORD:-woundiq_dev_only}@postgres:5432/${POSTGRES_DB:-woundiq}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-woundiq}:${POSTGRES_PASSWORD:-woundiq_dev_only}@postgres:5432/${POSTGRES_DB:-woundiq}
      REDIS_URL: redis://redis:6379/0
      PREFECT_API_URL: http://prefect:4200/api
    depends_on:
      postgres:
        condition: service_healthy
      prefect:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./pipeline:/app/pipeline
      - ./extraction:/app/extraction
      - ./eligibility:/app/eligibility
      - ./synthetic:/app/synthetic

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  # ── Observability ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prefect_data:
  prometheus_data:
  grafana_data:
